<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator | LG</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030a05;
      --card: #0e2415;
      --green-dim: #0b3318;
      --green-mid: #1a5c2e;
      --green-sat: #00b84a;
      --green-neon: #00ff7f;
      --text-pri: #c8ffd8;
      --text-sec: #6abf8a;
      --text-dim: #2e6644;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:var(--bg);
      font-family:'Rajdhani',sans-serif;
      color:var(--text-pri);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow-x:hidden; padding:20px;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,255,127,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,127,0.025) 1px,transparent 1px);
      background-size:44px 44px; pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; top:30%; left:50%; transform:translateX(-50%);
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle,rgba(0,100,40,0.10),transparent 70%);
      pointer-events:none; z-index:0;
    }
    canvas#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    /* ── NAVBAR ── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      padding:12px 40px;
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(3,10,5,0.88);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(0,255,127,0.12);
    }
    .nav-logo {
      font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900;
      color:var(--green-neon); letter-spacing:4px;
      filter:drop-shadow(0 0 10px rgba(0,255,127,0.5));
      text-decoration:none;
    }
    .nav-right { display:flex; align-items:center; gap:16px; }

    .nav-back {
      font-family:'Share Tech Mono',monospace; font-size:10px;
      color:var(--text-sec); text-decoration:none; letter-spacing:2px;
      transition:color 0.2s;
    }
    .nav-back:hover { color:var(--green-neon); }

    /* ── LANG DROPDOWN ── */
    .lang-dropdown-wrap { position:relative; }

    .lang-toggle-btn {
      font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
      background:rgba(0,255,127,0.06); border:1px solid var(--green-mid);
      color:var(--text-sec); padding:7px 14px; cursor:pointer;
      clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
      transition:all 0.25s; display:flex; align-items:center; gap:7px;
    }
    .lang-toggle-btn:hover, .lang-toggle-btn.open {
      background:rgba(0,255,127,0.12); border-color:var(--green-neon); color:var(--green-neon);
      box-shadow:0 0 10px rgba(0,255,127,0.15);
    }
    .lang-arrow { font-size:8px; transition:transform 0.25s; }
    .lang-toggle-btn.open .lang-arrow { transform:rotate(180deg); }

    .lang-menu {
      display:none; position:absolute; top:calc(100% + 6px); right:0;
      background:rgba(10,26,14,0.97); border:1px solid var(--green-mid);
      backdrop-filter:blur(12px); min-width:140px; z-index:200;
      clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
      box-shadow:0 8px 24px rgba(0,0,0,0.6);
    }
    .lang-menu.open { display:block; animation:dropIn 0.2s ease; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .lang-option {
      display:flex; align-items:center; gap:10px;
      padding:11px 16px; cursor:pointer;
      font-family:'Share Tech Mono',monospace; font-size:10px;
      color:var(--text-sec); letter-spacing:2px;
      border-bottom:1px solid rgba(0,255,127,0.07);
      transition:all 0.2s;
    }
    .lang-option:last-child { border-bottom:none; }
    .lang-option:hover { color:var(--green-neon); background:rgba(0,255,127,0.05); }
    .lang-option.active { color:var(--green-neon); }
    .lang-option.active::after {
      content:'✓'; margin-left:auto;
      color:var(--green-neon); font-size:10px;
    }
    .lang-flag { font-size:14px; }

    /* ── HEADER ── */
    header {
      position:relative; z-index:1;
      text-align:center; margin-bottom:32px; margin-top:80px;
    }
    .header-tag {
      font-family:'Share Tech Mono',monospace; font-size:10px;
      color:var(--green-sat); letter-spacing:4px; margin-bottom:8px;
    }
    .header-title {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(20px,5vw,36px); font-weight:900;
      color:var(--text-pri); letter-spacing:2px;
    }
    .header-title span {
      color:var(--green-neon);
      filter:drop-shadow(0 0 14px rgba(0,255,127,0.5));
    }
    .header-line {
      width:50px; height:2px; background:var(--green-neon);
      box-shadow:0 0 8px var(--green-neon); margin:12px auto 0;
    }

    /* ── CARD ── */
    .card {
      position:relative; z-index:1; width:100%; max-width:520px;
      background:rgba(10,26,14,0.92); backdrop-filter:blur(12px);
      border:1px solid var(--green-mid); padding:32px 36px;
      clip-path:polygon(0 0,calc(100% - 24px) 0,100% 24px,100% 100%,24px 100%,0 calc(100% - 24px));
    }
    .card::before,.card::after { content:''; position:absolute; width:14px; height:14px; }
    .card::before { top:0; right:0; border-top:2px solid var(--green-neon); border-right:2px solid var(--green-neon); }
    .card::after  { bottom:0; left:0; border-bottom:2px solid var(--green-neon); border-left:2px solid var(--green-neon); }

    /* ── PASSWORD BOX ── */
    .pass-box {
      display:flex; align-items:center;
      background:rgba(0,0,0,0.4); border:1px solid var(--green-mid);
      padding:0 16px; margin-bottom:8px;
      clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
      transition:border-color 0.3s;
    }
    .pass-box:focus-within { border-color:var(--green-neon); box-shadow:0 0 12px rgba(0,255,127,0.15); }
    #pass {
      flex:1; background:transparent; border:none; outline:none;
      font-family:'Share Tech Mono',monospace; font-size:18px;
      color:var(--green-neon); letter-spacing:2px; padding:18px 0;
    }
    #pass::placeholder { color:var(--text-dim); font-size:13px; letter-spacing:3px; }
    .copy-btn {
      background:none; border:none; cursor:pointer; color:var(--text-dim);
      display:flex; align-items:center; gap:5px;
      font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px;
      transition:all 0.25s;
    }
    .copy-btn:hover { color:var(--green-neon); filter:drop-shadow(0 0 6px rgba(0,255,127,0.5)); }
    .copy-btn svg { width:18px; height:18px; }

    /* ── STRENGTH ── */
    .strength-wrap { margin-bottom:24px; }
    .strength-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
    .strength-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:2px; }
    .strength-text  { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; font-weight:700; transition:color 0.4s; }
    .strength-bar-bg { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
    .strength-bar-fill { height:100%; width:0%; border-radius:3px; transition:width 0.5s ease,background 0.4s ease; }

    /* ── DIVIDER ── */
    .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,127,0.2),transparent); margin:20px 0; }

    /* ── SLIDER ── */
    .option-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:16px; }
    .option-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-sec); letter-spacing:2px; white-space:nowrap; }
    .length-val { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; color:var(--green-neon); min-width:30px; text-align:right; filter:drop-shadow(0 0 6px rgba(0,255,127,0.4)); }
    input[type="range"] { -webkit-appearance:none; flex:1; height:4px; background:var(--green-dim); border-radius:2px; outline:none; cursor:pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--green-neon); border:2px solid var(--bg); box-shadow:0 0 8px rgba(0,255,127,0.6); cursor:pointer; }

    /* ── CHECKBOXES ── */
    .checks-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
    .check-item {
      display:flex; align-items:center; gap:10px;
      background:var(--card); border:1px solid var(--green-dim);
      padding:10px 14px; cursor:pointer; transition:all 0.25s;
      clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));
    }
    .check-item:hover { border-color:var(--green-mid); }
    .check-item.active { border-color:var(--green-sat); background:rgba(0,255,127,0.05); }
    .check-item input[type="checkbox"] { display:none; }
    .check-box { width:14px; height:14px; border:1px solid var(--green-mid); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
    .check-item.active .check-box { background:var(--green-neon); border-color:var(--green-neon); box-shadow:0 0 8px rgba(0,255,127,0.5); }
    .check-box-tick { width:8px; height:8px; opacity:0; transition:opacity 0.2s; }
    .check-item.active .check-box-tick { opacity:1; }
    .check-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-sec); letter-spacing:1px; }
    .check-item.active .check-label { color:var(--text-pri); }

    /* ── BUTTON ── */
    #generatePass {
      width:100%; padding:16px;
      font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:3px;
      cursor:pointer; background:rgba(0,255,127,0.08);
      border:1px solid var(--green-neon); color:var(--green-neon);
      transition:all 0.3s; position:relative; overflow:hidden;
      clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
    }
    #generatePass::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(0,255,127,0.08),transparent);
      transform:translateX(-100%); transition:transform 0.4s ease;
    }
    #generatePass:hover::before { transform:translateX(100%); }
    #generatePass:hover { background:rgba(0,255,127,0.18); box-shadow:0 0 24px rgba(0,255,127,0.2); }
    #generatePass:active { transform:scale(0.99); }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:36px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:rgba(10,26,14,0.95); border:1px solid var(--green-neon);
      color:var(--green-neon); font-family:'Share Tech Mono',monospace;
      font-size:11px; letter-spacing:3px; padding:12px 28px;
      clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
      transition:transform 0.4s cubic-bezier(.34,1.56,.64,1),opacity 0.4s;
      opacity:0; z-index:999; box-shadow:0 0 20px rgba(0,255,127,0.2);
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* ── FOOTER ── */
    .footer-tag {
      position:relative; z-index:1; margin-top:24px;
      font-family:'Share Tech Mono',monospace; font-size:10px;
      color:var(--text-dim); letter-spacing:3px;
    }
    .footer-tag a { color:var(--green-sat); text-decoration:none; transition:color 0.2s; }
    .footer-tag a:hover { color:var(--green-neon); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--green-mid); }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">LG</a>
  <div class="nav-right">
    <a class="nav-back" href="index.html" data-i18n="nav.back">← PORTFOLIO</a>

    <!-- Language dropdown -->
    <div class="lang-dropdown-wrap" id="langWrap">
      <button class="lang-toggle-btn" id="langBtn" onclick="toggleDropdown()">
        <span class="lang-flag" id="langFlag">🇺🇸</span>
        <span id="langCurrent">EN</span>
        <span class="lang-arrow">▾</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <div class="lang-option active" id="opt-en" onclick="setLang('en')">
          <span class="lang-flag">🇺🇸</span> ENGLISH
        </div>
        <div class="lang-option" id="opt-es" onclick="setLang('es')">
          <span class="lang-flag">🇲🇽</span> ESPAÑOL
        </div>
      </div>
    </div>

  </div>
</nav>

<!-- HEADER -->
<header>
  <div class="header-tag" data-i18n="header.tag">// SECURITY TOOL · LG</div>
  <h1 class="header-title"><span data-i18n="header.title.1">PASSWORD</span> <span data-i18n="header.title.2">GENERATOR</span></h1>
  <div class="header-line"></div>
</header>

<!-- CARD -->
<div class="card">

  <div class="pass-box">
    <input type="text" id="pass" data-i18n-placeholder="pass.placeholder" readonly>
    <button class="copy-btn" id="copy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
      <span data-i18n="btn.copy">COPY</span>
    </button>
  </div>

  <div class="strength-wrap">
    <div class="strength-header">
      <span class="strength-label" data-i18n="strength.label">STRENGTH</span>
      <span class="strength-text" id="strength-text">—</span>
    </div>
    <div class="strength-bar-bg">
      <div class="strength-bar-fill" id="strength-bar"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="option-row">
    <span class="option-label" data-i18n="label.length">LENGTH</span>
    <input type="range" id="lengthSlider" min="6" max="32" value="12">
    <span class="length-val" id="lengthVal">12</span>
  </div>

  <div class="divider"></div>

  <div class="checks-grid">
    <label class="check-item active" id="lbl-upper">
      <input type="checkbox" id="chk-upper" checked>
      <div class="check-box">
        <svg class="check-box-tick" viewBox="0 0 10 10" fill="none" stroke="#030a05" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="check-label" data-i18n="chk.upper">UPPERCASE</span>
    </label>
    <label class="check-item active" id="lbl-lower">
      <input type="checkbox" id="chk-lower" checked>
      <div class="check-box">
        <svg class="check-box-tick" viewBox="0 0 10 10" fill="none" stroke="#030a05" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="check-label" data-i18n="chk.lower">LOWERCASE</span>
    </label>
    <label class="check-item active" id="lbl-numbers">
      <input type="checkbox" id="chk-numbers" checked>
      <div class="check-box">
        <svg class="check-box-tick" viewBox="0 0 10 10" fill="none" stroke="#030a05" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="check-label" data-i18n="chk.numbers">NUMBERS</span>
    </label>
    <label class="check-item active" id="lbl-symbols">
      <input type="checkbox" id="chk-symbols" checked>
      <div class="check-box">
        <svg class="check-box-tick" viewBox="0 0 10 10" fill="none" stroke="#030a05" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="check-label" data-i18n="chk.symbols">SYMBOLS</span>
    </label>
  </div>

  <button id="generatePass" data-i18n="btn.generate">⚡ GENERATE PASSWORD</button>
</div>

<div class="footer-tag">LG © 2026</div>

<div class="toast" id="toast" data-i18n="toast.copied">✓ PASSWORD COPIED</div>

<script>
/* ── CANVAS ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);
const pts = Array.from({length:22},()=>({
  x:Math.random()*canvas.width, y:Math.random()*canvas.height,
  r:Math.random()*1.5+0.5, a:Math.random()*0.3+0.04
}));
function drawCircuits(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pts.forEach((p,i)=>{
    pts.slice(i+1).forEach(q=>{
      const d=Math.hypot(p.x-q.x,p.y-q.y);
      if(d<180){ const al=(1-d/180)*0.2;
        ctx.beginPath(); ctx.strokeStyle=`rgba(0,200,80,${al})`; ctx.lineWidth=0.8;
        ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); }
    });
    ctx.beginPath(); ctx.fillStyle=`rgba(0,255,127,${p.a})`;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
}
drawCircuits();

/* ── TRANSLATIONS ── */
const T = {
  en: {
    'nav.back':          '← PORTFOLIO',
    'header.tag':        '// SECURITY TOOL · LG',
    'header.title.1':    'PASSWORD',
    'header.title.2':    'GENERATOR',
    'pass.placeholder':  'GENERATE A PASSWORD...',
    'btn.copy':          'COPY',
    'strength.label':    'STRENGTH',
    'label.length':      'LENGTH',
    'chk.upper':         'UPPERCASE',
    'chk.lower':         'LOWERCASE',
    'chk.numbers':       'NUMBERS',
    'chk.symbols':       'SYMBOLS',
    'btn.generate':      '⚡ GENERATE PASSWORD',
    'toast.copied':      '✓ PASSWORD COPIED',
    'str.weak':   'WEAK',
    'str.fair':   'FAIR',
    'str.good':   'GOOD',
    'str.strong': 'STRONG',
  },
  es: {
    'nav.back':          '← PORTAFOLIO',
    'header.tag':        '// HERRAMIENTA DE SEGURIDAD · LG',
    'header.title.1':    'GENERADOR DE',
    'header.title.2':    'CONTRASEÑAS',
    'pass.placeholder':  'GENERA UNA CONTRASEÑA...',
    'btn.copy':          'COPIAR',
    'strength.label':    'FORTALEZA',
    'label.length':      'LONGITUD',
    'chk.upper':         'MAYÚSCULAS',
    'chk.lower':         'MINÚSCULAS',
    'chk.numbers':       'NÚMEROS',
    'chk.symbols':       'SÍMBOLOS',
    'btn.generate':      '⚡ GENERAR CONTRASEÑA',
    'toast.copied':      '✓ CONTRASEÑA COPIADA',
    'str.weak':   'DÉBIL',
    'str.fair':   'REGULAR',
    'str.good':   'BUENA',
    'str.strong': 'FUERTE',
  }
};

let lang = 'en';

function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.title = l === 'en' ? 'Password Generator | LG' : 'Generador de Contraseñas | LG';

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (T[l][k] !== undefined) el.textContent = T[l][k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.getAttribute('data-i18n-placeholder');
    if (T[l][k] !== undefined) el.placeholder = T[l][k];
  });

  // Update dropdown UI
  document.getElementById('langCurrent').textContent = l.toUpperCase();
  document.getElementById('langFlag').textContent = l === 'en' ? '🇺🇸' : '🇲🇽';
  document.getElementById('opt-en').classList.toggle('active', l === 'en');
  document.getElementById('opt-es').classList.toggle('active', l === 'es');

  // Re-render strength label if password exists
  if (document.getElementById('pass').value) updateStrength(document.getElementById('pass').value);
}

function setLang(l) {
  applyLang(l);
  closeDropdown();
}

/* ── DROPDOWN ── */
function toggleDropdown() {
  const menu = document.getElementById('langMenu');
  const btn  = document.getElementById('langBtn');
  const open = menu.classList.toggle('open');
  btn.classList.toggle('open', open);
}
function closeDropdown() {
  document.getElementById('langMenu').classList.remove('open');
  document.getElementById('langBtn').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('langWrap').contains(e.target)) closeDropdown();
});

/* ── CHAR SETS ── */
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ', LOWER='abcdefghijklmnopqrstuvwxyz',
      NUMBERS='0123456789', SYMBOLS='@$%&*_#!?+-';

const passEl=document.getElementById('pass'), copyBtn=document.getElementById('copy'),
      genBtn=document.getElementById('generatePass'), slider=document.getElementById('lengthSlider'),
      lengthVal=document.getElementById('lengthVal'), strengthBar=document.getElementById('strength-bar'),
      strengthText=document.getElementById('strength-text'), toast=document.getElementById('toast'),
      chkUpper=document.getElementById('chk-upper'), chkLower=document.getElementById('chk-lower'),
      chkNumbers=document.getElementById('chk-numbers'), chkSymbols=document.getElementById('chk-symbols'),
      lblUpper=document.getElementById('lbl-upper'), lblLower=document.getElementById('lbl-lower'),
      lblNumbers=document.getElementById('lbl-numbers'), lblSymbols=document.getElementById('lbl-symbols');

[[chkUpper,lblUpper],[chkLower,lblLower],[chkNumbers,lblNumbers],[chkSymbols,lblSymbols]]
  .forEach(([chk,lbl]) => {
    lbl.addEventListener('click',()=>{
      const active=[chkUpper,chkLower,chkNumbers,chkSymbols].filter(c=>c.checked);
      if(active.length===1&&active[0]===chk) return;
      chk.checked=!chk.checked;
      lbl.classList.toggle('active',chk.checked);
    });
  });

slider.addEventListener('input',()=>{ lengthVal.textContent=slider.value; });

function calcStrength(p){
  let s=0;
  if(p.length>=8)s++; if(p.length>=12)s++; if(p.length>=20)s++;
  if(/[A-Z]/.test(p))s++; if(/[a-z]/.test(p))s++;
  if(/[0-9]/.test(p))s++; if(/[@$%&*_#!?+\-]/.test(p))s++;
  return s;
}
function updateStrength(p){
  if(!p){strengthBar.style.width='0%';strengthText.textContent='—';return;}
  const s=calcStrength(p);
  let pct,color,key;
  if(s<=2){pct='20%';color='#ff4444';key='str.weak';}
  else if(s<=3){pct='45%';color='#ffaa00';key='str.fair';}
  else if(s<=5){pct='72%';color='#00b84a';key='str.good';}
  else{pct='100%';color='#00ff7f';key='str.strong';}
  strengthBar.style.width=pct;
  strengthBar.style.background=color;
  strengthBar.style.boxShadow=`0 0 8px ${color}`;
  strengthText.style.color=color;
  strengthText.textContent=T[lang][key];
}

function generatePass(){
  const len=parseInt(slider.value);
  let pool=''; const guaranteed=[];
  if(chkUpper.checked){pool+=UPPER;guaranteed.push(UPPER[Math.floor(Math.random()*UPPER.length)]);}
  if(chkLower.checked){pool+=LOWER;guaranteed.push(LOWER[Math.floor(Math.random()*LOWER.length)]);}
  if(chkNumbers.checked){pool+=NUMBERS;guaranteed.push(NUMBERS[Math.floor(Math.random()*NUMBERS.length)]);}
  if(chkSymbols.checked){pool+=SYMBOLS;guaranteed.push(SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]);}
  if(!pool)return;
  let pass=[...guaranteed];
  while(pass.length<len)pass.push(pool[Math.floor(Math.random()*pool.length)]);
  for(let i=pass.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pass[i],pass[j]]=[pass[j],pass[i]];}
  passEl.value=pass.join('');
  updateStrength(passEl.value);
}

function copyPass(){
  if(!passEl.value)return;
  navigator.clipboard.writeText(passEl.value).catch(()=>{passEl.select();document.execCommand('copy');});
  toast.textContent=T[lang]['toast.copied'];
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2200);
}

genBtn.addEventListener('click',generatePass);
copyBtn.addEventListener('click',copyPass);

applyLang('en');
generatePass();
</script>
</body>
